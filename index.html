<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->
    <div class="p-4 text-white bg-gradient-to-r from-green-400 to-green-700">
      <h1 class="text-xl font-bold">🥗 Daily Meal Planner</h1>
    </div>

    <!-- CONTENT -->
    <div class="p-4 max-w-xl mx-auto">
      <button
        onclick="generateMeal()"
        class="w-full bg-black text-white py-3 rounded-lg mb-4 text-lg"
      >
        Generate Today’s Meal
      </button>

      <div id="mealPlan"></div>
    </div>

    <script>
      function random(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      const breakfastOptions = [
        "2 Idli + Peanut chutney (1 tbsp) + Skyr (1/2 cup)",
        "1 Dosa + Coconut chutney (1 tbsp) + Tofu (150g)",
        "Vegetable upma (200g) + Curd (1 bowl)",
        "2 Idli + Idli podi (1 tbsp) + Soy chunks (30g)",
        "1 Dosa + Tomato chutney + Skyr (1/2 cup)",
        "Vegetable poha (200g) + Peanuts (10g) + Curd",
        "Ragi dosa (1–2) + Tofu (150g)",
        "Vegetable uthappam (1 medium) + Peanut chutney (1 tbsp)",
        "Curd + Peanut powder (1 tbsp) + 1 small fruit",
        "Skyr (1 cup) + Roasted chana (20g)",
      ];

      const snacks = [
        "Roasted chana (20–25g)",
        "Peanuts - dry roasted (15–20g)",
        "Almonds (10–12 pieces ~15g)",
        "Makhana (20g roasted)",
        "Skyr (1 cup)",
        "Curd (1 bowl)",
        "Soy chunks (25g boiled)",
        "Boiled corn (1 bowl)",
        "Fruit + 10g peanuts",
        "Peanut powder (1 tbsp) + cucumber",
      ];

      const lunchOptions = [
        "Rice (1 cup) + Vegetable kootu + Beans poriyal + Curd",
        "Rice (1 cup) + Rasam + Cabbage poriyal + Curd",
        "Rice (1 cup) + Tomato rasam + Carrot poriyal + Curd",
        "2 Chapati + Tofu (150g) + Vegetable curry",
        "2 Chapati + Soy chunks (50g) + Vegetable curry",
        "Vegetable upma (250g) + Curd",
        "Curd rice (1 cup) + Carrot + Peanut powder (1 tbsp)",
        "Lemon rice (1 cup) + Curd + Roasted chana (15g)",
      ];

      const dinnerOptions = [
        "2 Chapati + Tofu (150–200g) + Beans poriyal",
        "2 Chapati + Soy chunks (50g) + Cabbage poriyal",
        "2 Chapati + Paneer (150g) + Mixed vegetable curry",
        "Tofu (200g) + Stir fried vegetables",
        "Soy chunks (50g) + Vegetable curry (no chapati)",
        "Paneer (150g) + Vegetable sauté",
        "Curd (1 bowl) + Peanut powder (1 tbsp) + Salad",
        "Skyr (1 cup) + Roasted chana (20g)",
      ];

      const exercises = [
        {
          name: "Jump Rope",
          desc: "5 rounds × 2 mins",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Jump-Rope.gif",
        },
        {
          name: "Squats",
          desc: "3 sets × 15 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Bodyweight-Squat.gif",
        },
        {
          name: "Push-ups",
          desc: "3 sets × 10–15 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Push-Up.gif",
        },
        {
          name: "Plank",
          desc: "3 sets × 45 sec",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Plank.gif",
        },
        {
          name: "Burpees",
          desc: "3 sets × 10 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Burpee.gif",
        },
        {
          name: "Mountain Climbers",
          desc: "3 sets × 30 sec",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Mountain-Climber.gif",
        },
        {
          name: "High Knees",
          desc: "3 sets × 30 sec",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/High-Knees.gif",
        },
        {
          name: "Lunges",
          desc: "3 sets × 12 reps each leg",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Lunge.gif",
        },
        {
          name: "Glute Bridge",
          desc: "3 sets × 15 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Glute-Bridge.gif",
        },
        {
          name: "Wall Sit",
          desc: "3 sets × 45 sec",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Wall-Sit.gif",
        },
        {
          name: "Bicycle Crunch",
          desc: "3 sets × 20 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Bicycle-Crunch.gif",
        },
        {
          name: "Leg Raises",
          desc: "3 sets × 15 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Lying-Leg-Raise.gif",
        },
        {
          name: "Russian Twists",
          desc: "3 sets × 20 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Russian-Twist.gif",
        },
        {
          name: "Superman Hold",
          desc: "3 sets × 30 sec",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Superman.gif",
        },
        {
          name: "Tricep Dips (Chair)",
          desc: "3 sets × 12 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Triceps-Dips.gif",
        },
        {
          name: "Incline Push-ups",
          desc: "3 sets × 12 reps",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Incline-Push-Up.gif",
        },
        {
          name: "Step-ups",
          desc: "3 sets × 12 reps each leg",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Step-up.gif",
        },
        {
          name: "Side Plank",
          desc: "3 sets × 30 sec each side",
          gif: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Side-Plank.gif",
        },
      ];

      const videos = [
        "https://www.youtube.com/embed/2pLT-olgUJs",
        "https://www.youtube.com/embed/UBMk30rjy0o",
        "https://www.youtube.com/embed/1skBf6h2ksI",
        "https://www.youtube.com/embed/50kH47ZztHs",
        "https://www.youtube.com/embed/8BcPHWGQO44",
        "https://www.youtube.com/embed/2pLT-olgUJs",
        "https://www.youtube.com/embed/UBMk30rjy0o",
        "https://www.youtube.com/embed/1skBf6h2ksI",
        "https://www.youtube.com/embed/50kH47ZztHs",
        "https://www.youtube.com/embed/8BcPHWGQO44",
      ];

      function getRandomMedia(exercise) {
        const showVideo = Math.random() > 0.5;

        if (showVideo) {
          return `
      <iframe 
        class="w-full rounded-lg shadow"
        height="200"
        src="${random(videos)}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
        } else {
          return `
      <img 
        src="${exercise.gif}" 
        class="w-full rounded-lg shadow"
      />
    `;
        }
      }

      /* ================== MAIN ================== */

      function generateMeal() {
        const exercise = random(exercises);
        const media = getRandomMedia(exercise);

        const mealHTML = `
    <div class="bg-white p-4 rounded-xl shadow space-y-4">

      <p><b>🌅 Morning:</b> Methi water (500ml) + Whey protein</p>

      <p><b>🍽 Breakfast:</b><br>${random(breakfastOptions)}</p>

      <p><b>🍛 Lunch:</b><br>${random(lunchOptions)}</p>

      <p><b>☕ Evening:</b><br>${random(snacks)} + Tea</p>

      <p><b>🌙 Dinner:</b><br>${random(dinnerOptions)}</p>

      <hr>

      <div class="text-center space-y-2">
        <p class="font-bold text-lg">🏃 Today’s Exercise</p>
        <p class="text-gray-600">${exercise.name} — ${exercise.desc}</p>

        ${media}
      </div>

    </div>
  `;

        document.getElementById("mealPlan").innerHTML = mealHTML;
      }
    </script>
  </body>
</html>
